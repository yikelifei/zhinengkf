      - "tools\\reports\\run_image_prompt_jobs.bat"
    check_commands:
      - "tools\\_run_python_task.bat scripts\\run_unit_tests.py tests\\test_image_prompt_jobs.py"
    acceptance:
      - "能把客户需求结构化。"
      - "能生成出图软件可用提示词。"
      - "改图意见进入人工队列。"
    next_steps:
      - "新增 image_prompt_extractor。"
      - "新增 image_jobs 表和 API。"

  - id: "08_open_api"
