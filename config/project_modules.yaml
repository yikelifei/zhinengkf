version: 1
updated_at: "2026-06-24"
description: "智能客服项目模块分类、运行命令和验收标准。"

modules:
  - id: "01_wechat_core"
    category: "channel"
    title: "微信主客服闭环"
    status: "running"
    purpose: "保持微信作为主要成交和客服承接阵地，稳定收消息、生成回复、发送回复、记录会话。"
    doc: "docs/projects/01_wechat_core.md"
    inputs:
      - "微信 PC 客户端消息"
      - "config/settings.yaml"
      - "config/customer_knowledge.yaml"
    outputs:
      - "data/kefu.db"
      - "logs/bot.log"
      - "客户会话和线索记录"
    run_commands:
      - "tools\\quality\\run_smoke_tests.bat"
    check_commands:
      - "tools\\quality\\run_tests.bat"
      - "tools\\_run_python_task.bat scripts\\run_unit_tests.py tests\\test_core.py"
    acceptance:
      - "常见问题能自动回复。"
      - "投诉、退款、复杂报价能转人工。"
      - "不重复刷屏，不乱承诺价格和交期。"
    next_steps:
      - "继续修复真实微信运行中的边界问题。"
      - "保持每次修改后运行 smoke 检查。"

  - id: "02_platform_lead_capture"
    category: "lead_acquisition"
    title: "抖音/小红书平台线索承接"
    status: "partial"
    purpose: "把抖音、小红书来的客户作为获客线索记录下来，最终引导到微信成交。"
    doc: "docs/projects/02_platform_lead_capture.md"
    inputs:
      - "平台来源"
      - "客户昵称"
      - "来源笔记/视频/评论"
      - "客户需求"
    outputs:
      - "平台线索池"
      - "微信来源绑定"
      - "来源转化报表"
    run_commands:
      - "tools\\reports\\run_platform_leads.bat"
    check_commands:
      - "tools\\_run_python_task.bat scripts\\run_unit_tests.py tests\\test_platform_leads.py"
    acceptance:
      - "可以手动录入抖音/小红书线索。"
      - "客户加微信后能绑定来源。"
      - "能统计不同平台带来的高价值客户。"
    next_steps:
      - "新增平台线索数据结构。"
      - "新增 Web 控制台录入和筛选界面。"

  - id: "03_knowledge_learning"
    category: "knowledge"
    title: "知识库与真人话术学习"
    status: "partial"
    purpose: "从真实微信聊天记录中提取 FAQ、客户异议和高转化真人话术，人工审核后进入知识库。"
    doc: "docs/projects/03_knowledge_learning.md"
    inputs:
      - "微信聊天记录"
      - "人工客服回复"
      - "现有知识库"
    outputs:
      - "FAQ 候选"
      - "真人话术样本"
      - "客户异议库"
      - "知识库更新建议"
    run_commands:
      - "tools\\reports\\run_reply_style_miner.bat"
    check_commands:
      - "tools\\quality\\run_answer_guard_audit.bat"
      - "tools\\quality\\run_quality_audit.bat"
    acceptance:
      - "聊天记录不能直接污染知识库。"
      - "新知识必须人工审核后入库。"
      - "能产出可复用真人话术样本。"
    next_steps:
      - "新增聊天记录导入器。"
      - "新增知识候选审核界面。"

  - id: "04_smart_reply_engine"
    category: "reply"
    title: "智能回复与安全护栏"
    status: "running"
    purpose: "用规则、知识库、AI 和安全护栏生成自然、可靠、可控的客服回复。"
    doc: "docs/projects/04_smart_reply_engine.md"
    inputs:
      - "客户消息"
      - "会话上下文"
      - "知识库"
      - "客户资料"
    outputs:
      - "建议回复"
      - "人工接管原因"
      - "回复来源和意图"
    run_commands:
      - "tools\\_run_python_task.bat scripts\\run_unit_tests.py tests\\test_core.py"
    check_commands:
      - "tools\\quality\\run_answer_guard_audit.bat"
      - "tools\\quality\\run_business_hours_audit.bat"
    acceptance:
      - "回复不暴露 AI。"
      - "不编造价格、交期和售后承诺。"
      - "支持多话术随机表达。"
    next_steps:
      - "把回复质量样本接入控制台复盘。"
      - "继续补充危险承诺拦截规则。"

  - id: "05_high_value_leads"
    category: "crm"
    title: "高价值客户筛选"
    status: "running"
    purpose: "根据数量、预算、交期、企业采购、联系方式等信息筛出值得人工优先跟进的客户。"
    doc: "docs/projects/05_high_value_leads.md"
    inputs:
      - "客户线索"
      - "会话阶段"
      - "报价字段"
    outputs:
      - "高价值客户清单"
      - "优先级分数"
      - "推荐下一步动作"
    run_commands:
      - "tools\\reports\\run_high_value_leads.bat"
    check_commands:
      - "tools\\_run_python_task.bat scripts\\run_unit_tests.py tests\\test_high_value.py"
    acceptance:
      - "能输出高价值客户清单。"
      - "能解释筛选原因。"
      - "能指出缺失字段和下一步动作。"
    next_steps:
      - "加入来源平台权重。"
      - "加入是否愿意加微信作为评分因子。"

  - id: "06_quote_and_followup"
    category: "sales_ops"
    title: "报价准备和跟进任务"
    status: "running"
    purpose: "检查报价必填字段是否齐全，并生成今日跟进任务。"
    doc: "docs/projects/06_quote_and_followup.md"
    inputs:
      - "客户线索"
      - "报价必填字段"
      - "最近对话时间"
    outputs:
      - "报价准备清单"
      - "跟进任务"
      - "订单交接清单"
    run_commands:
      - "tools\\reports\\run_quote_readiness.bat"
      - "tools\\reports\\run_followup_tasks.bat"
      - "tools\\reports\\run_order_handoff.bat"
    check_commands:
      - "tools\\quality\\run_sla_monitor.bat"
      - "tools\\operations\\run_handoff_queue.bat"
    acceptance:
      - "能告诉人工还缺哪些字段。"
      - "能生成今日应跟进客户。"
      - "能区分报价准备和订单交接。"
    next_steps:
      - "把报价字段补齐动作接入控制台。"
      - "增加报价单生成接口。"

  - id: "07_image_prompt_jobs"
