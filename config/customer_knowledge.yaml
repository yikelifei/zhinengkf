# 礼盒定制行业知识库。商业交付时优先让客户在后台维护这些条目。

documents:
  - id: pricing
    title: 价格与报价
    keywords: ["价格", "多少钱", "报价", "费用", "预算", "单价", "成本", "贵", "便宜"]
    answer: "礼盒价格取决于数量、材质、尺寸、内装产品、LOGO、贺卡、腰封、吊牌和配送方式。常规款大致 8-35 元/份，高端定制约 35-80 元/份，最终报价需要按具体需求人工核算。"

  - id: moq
    title: 起订量
    keywords: ["起订", "起做", "最低", "最少", "多少份", "小批量", "几份", "样品"]
    answer: "常规建议 50 份起做，100 份以上价格和工艺选择会更灵活。小批量、样品或试单可以先沟通数量、预算和使用日期，再判断是否适合制作。"

  - id: delivery
    title: 交期
    keywords: ["交期", "多久", "几天", "发货", "什么时候", "来得及", "加急", "使用日期"]
    answer: "常规交期一般是确认方案和设计稿后 5-7 个工作日。加急单、复杂工艺、大数量或节日前高峰需要人工确认排期。"

  - id: customization
    title: 定制内容
    keywords: ["定制", "logo", "LOGO", "贺卡", "腰封", "吊牌", "丝带", "印字", "企业", "设计"]
    answer: "支持企业 LOGO、贺卡、腰封、吊牌、丝带、祝福语和包装结构定制。设计稿、打样和生产细节需要人工设计师确认。"

  - id: process
    title: 定制流程
    keywords: ["流程", "怎么做", "怎么定制", "怎么下单", "步骤", "合作", "购买", "订购"]
    answer: "定制流程是先确认节日或用途、数量、预算和收货城市，再匹配方案，确认设计稿，生产质检，最后发货。下单前需要公司名称、联系人、电话、数量、预算、使用日期和收货城市。"

  - id: styles
    title: 款式与案例
    keywords: ["款式", "案例", "图片", "照片", "效果图", "看看", "推荐", "有哪些", "种类"]
    answer: "常见方向有端午粽子礼盒、中秋月饼礼盒、春节年货礼盒、女神节礼盒、企业伴手礼、简约商务款、国潮款和高端定制款。可以按预算和使用场景推荐。"

  - id: shipping
    title: 物流配送
    keywords: ["物流", "快递", "配送", "运费", "包邮", "发到", "收货", "城市"]
    answer: "配送方式和运费取决于数量、体积、重量和收货城市。大批量通常走物流，小批量可走快递，最终运费需要按地址核算。"

  - id: invoice
    title: 发票
    keywords: ["发票", "开票", "税点", "普票", "专票", "税率"]
    answer: "发票类型和税点需要按订单主体、品类和金额确认。涉及开票信息、付款异常或合同条款时建议转人工处理。"
    route: transfer_human

  - id: after_sales
    title: 售后
    keywords: ["售后", "破损", "漏发", "少发", "质量问题", "退款", "退货", "投诉", "差评"]
    answer: "售后、退款、质量问题和投诉需要人工客服核实订单信息后处理。"
    route: transfer_human

  - id: human_handoff
    title: 人工介入
    keywords: ["人工", "客服", "电话", "语音", "投诉", "差评", "退款", "售后", "发票", "付款异常"]
    answer: "已为您转接人工客服，请稍等。"
    route: transfer_human
