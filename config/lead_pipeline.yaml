stages:
- id: new_inquiry
  label: 新咨询
  order: 10
  active: true
  description: 客户刚咨询，还未收集完整需求。
  default_next_action: 引导客户补充用途、数量、预算、城市和使用日期。
- id: info_collected
  label: 已留资
  order: 20
  active: true
  description: 已拿到关键联系方式或需求信息。
  default_next_action: 人工确认需求并准备报价。
- id: quotation_given
  label: 已报价
  order: 30
  active: true
  description: 已给客户报价或报价区间。
  default_next_action: 跟进客户预算反馈，确认是否需要方案图或打样。
- id: design_discussion
  label: 方案沟通
  order: 40
  active: true
  description: 正在沟通 LOGO、贺卡、腰封、吊牌或包装方案。
  default_next_action: 确认设计稿、材质和生产排期。
- id: sample_sent
  label: 已寄样
  order: 50
  active: true
  description: 已寄样或已发送案例/方案图。
  default_next_action: 跟进样品反馈并推动确认订单。
- id: ready_to_order
  label: 待下单
  order: 60
  active: true
  description: 客户已有明确下单意向。
  default_next_action: 确认合同、付款、开票和收货信息。
- id: ordered
  label: 已成交
  order: 70
  active: false
  description: 已成交或进入生产交付。
  default_next_action: 跟进生产、质检和发货。
- id: lost
  label: 已流失
  order: 80
  active: false
  description: 客户明确不继续或长期无反馈。
  default_next_action: 记录流失原因，复盘价格、交期或方案问题。
rules:
  high_intent_score: 80
  medium_intent_score: 50
  stale_days: 2
  required_fields:
  - phone_or_wechat
  - quantity_estimate
  - budget
  - due_date
  - city
