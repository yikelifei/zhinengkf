# ╔══════════════════════════════════════════╗
# ║ 关键词库配置                               ║
# ║ - keywords: 触发关键词列表                  ║
# ║ - reply_template: 回复话术模板              ║
# ║ - priority: 匹配优先级（数值越大越优先）      ║
# ║ - lead_capture: true 时触发线索收集          ║
# ╚══════════════════════════════════════════╝

# ── 首次欢迎语（不由关键词匹配触发，由会话状态触发）──
welcome:
  is_welcome: true
  priority: 100
  reply_template: |
    您好呀~欢迎光临！🎁
    我们是专业的企业礼盒定制服务商，提供节日礼盒的设计、生产、配送一站式服务。
    请问您需要哪种节日的礼盒呢？端午节、中秋节、春节都有现成方案~

# ── 打招呼 ──
greeting:
  keywords: ["你好", "您好", "hi", "hello", "在吗", "在不在", "哈喽", "嗨"]
  priority: 85
  reply_template: |
    您好~很高兴为您服务😊
    请问您是想了解礼盒产品、定制流程，还是有其他问题呢？直接告诉我就好~

# ── 询价 ──
price:
  keywords: ["价格", "多少钱", "报价", "贵不贵", "预算", "便宜", "划算", "价位", "多钱"]
  priority: 95
  lead_capture: true
  reply_template: |
    我们的礼盒价格根据材质、数量和定制项不同，大致区间是：
    基础款礼盒 ¥8-15/个（不含定制）
    中高端礼盒 ¥15-35/个（含贺卡+腰封+吊牌）
    高端定制礼盒 ¥35-80/个（全定制，含丝绒/木盒等特殊材质）
    量大更优惠哦！您大概需要多少份呢？我帮您精准报价~ 🎁

# ── 起订量 ──
min_order:
  keywords: ["最少", "起定量", "起订量", "起步量", "最少做多少", "小单", "批量"]
  priority: 90
  lead_capture: true
  reply_template: |
    我们的起订量是 50份起做~ 😊
    100份以上享折扣价，300份以上可以单独开模具定制专属造型！
    您是公司采购还是个人定制呢？

# ── 定制流程 ──
custom_process:
  keywords: ["定制流程", "怎么定制", "流程", "怎么做", "步骤", "定制方式"]
  priority: 85
  reply_template: |
    定制流程很简单，5步搞定：
    1️⃣ 沟通需求 — 节日、数量、预算
    2️⃣ 设计方案 — 我们出贺卡+腰封+吊牌效果图给您选
    3️⃣ 确认打样 — 寄实物样品给您确认
    4️⃣ 批量生产 — 确认后3-5个工作日完成
    5️⃣ 质检发货 — 打包好发到您指定地点
    全程都有专人跟进，您不用操心~ 想了解哪个环节？

# ── 贺卡定制 ──
card_custom:
  keywords: ["贺卡", "贺词", "卡片", "写什么", "祝福语", "inscribed card"]
  priority: 80
  follow_up: "要不要看下我们的贺卡设计案例？"
  reply_template: |
    贺卡我们可以帮您设计排版，您只需要提供：
    ✍️ 企业名称 + LOGO
    ✍️ 祝福语/贺词内容（没有的话我们有模板可选）
    ✍️ 颜色偏好（企业VI色系最佳）
    我们会出具效果图给您确认后再印刷~
    贺卡额外费用约 ¥1-3/张，量大更优惠！

# ── 腰封定制 ──
waistband_custom:
  keywords: ["腰封", "书型盒", "外套", "封面", "纸套"]
  priority: 75
  reply_template: |
    腰封是套在礼盒外面的装饰纸带，相当于礼盒的"外衣"~ 📦
    可以印制企业LOGO、产品名称、宣传语。
    材质有铜版纸、特种纸两种可选，触感更好看。
    费用约 ¥0.5-1.5/条，包含在设计费里！

# ── 吊牌定制 ──
tag_custom:
  keywords: ["吊牌", "挂牌", "标签", "铭牌", "挂饰", "hanging tag"]
  priority: 70
  reply_template: |
    吊牌可以定制形状（圆形/方形/异形）、材质（铜版纸/牛皮纸/PET透明）。
    建议搭配礼盒风格设计，加上企业Logo和产品简介。
    费用约 ¥0.3-1/个，100份以上免费设计！

# ── 交期 ──
delivery_time:
  keywords: ["多久", "多长时间", "交期", "什么时候要", "急要", "加急", "时间紧"]
  priority: 88
  reply_template: |
    标准交期：确认后 5-7 个工作日。
    急单可以走加急通道，3个工作日交稿+生产（加收15%加急费）。
    但是建议提前15-20天联系我们，这样时间充裕可以多做几版设计给您选~ 💡

# ── 案例 / 样品 ──
case_study:
  keywords: ["案例", "样品", "看过往", "以前做过", "看看", "图片", "效果图", "实拍", "照片"]
  priority: 82
  auto_send_image: true
  image_dir: "assets/sample_images/"
  reply_template: |
    我们有丰富的案例经验，做过这些节日的礼盒：
    🎋 端午节 — 粽子礼盒（竹编风/国潮风）
    🥮 中秋节 — 月饼礼盒（精装纸质/木质/铁盒）
    🧧 春节 — 年货礼包（红色喜庆系列）
    💝 三八节/母亲节 — 女性礼品套装
    🎆 国庆/周年庆 — 企业定制伴手礼
    我发几张实拍图给您看看~

# ── 质量顾虑 ──
quality_concern:
  keywords: ["质量好不好的", "会不会破损", "质量", "材质", "结实", "安全", "环保"]
  priority: 78
  reply_template: |
    您可以放心~我们用的都是食品级环保材料，通过SGS认证。
    每批出货前都有严格质检，破损率控制在1%以内。
    下单前可以先寄样品给您确认，满意再批量生产！

# ── 竞品比较 ──
competition:
  keywords: ["跟xx比", "对比", "和xx家比", "哪家更好", "性价比"]
  priority: 65
  reply_template: |
    我们在同行中有几个优势：
    ✅ 自有工厂，没有中间商赚差价
    ✅ 支持小批量试单（50份起），灵活度高
    ✅ 设计师团队在线出效果图，修改到满意为止
    ✅ 全国包邮，大批量还免运费
    您可以对比一下，有任何具体问题随时问我~

# ── 下单 / 确定购买 ──
order_confirm:
  keywords: ["下单", "订购", "合作", "要一份", "给我来一个", "联系", "想买", "怎么买"]
  priority: 99
  action: capture_lead_and_alert
  reply_template: |
    太好了！我来帮您登记一下需求~ 🙂

    方便留一下您的**公司名称**和**联系电话**吗？我们的客户经理会在30分钟内联系您，给您报精准价格并安排后续~

# ── 转人工 ──
transfer_human:
  keywords: ["找人工", "太复杂了要电话", "投诉", "差评", "退款", "要语音", "打电话"]
  priority: 99
  action: alert_human
  reply_template: "已为您转接人工客服，请稍候..."

# ── 结束语 ──
goodbye:
  keywords: ["再见", "拜拜", "谢谢", "感谢", "先这样"]
  priority: 60
  reply_template: "好的~有任何问题随时找我，祝您今天心情愉快！😊"
