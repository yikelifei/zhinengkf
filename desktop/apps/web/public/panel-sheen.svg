<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="26" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="gloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.42" />
      <stop offset="0.34" stop-color="#fff" stop-opacity="0.08" />
      <stop offset="1" stop-color="#fff" stop-opacity="0" />
    </linearGradient>
    <pattern id="threads" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
      <path d="M0 0H18" stroke="#fff" stroke-opacity="0.13" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="180" height="180" fill="url(#gloss)" />
  <rect width="180" height="180" fill="url(#threads)" opacity="0.42" />
  <rect width="180" height="180" filter="url(#grain)" />
</svg>
